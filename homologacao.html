<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>NEXLAB v26.9.0 — Homologação Projetos</title><style>:root{font-family:Inter,system-ui,Arial,sans-serif;color:#0E1F3D;background:#f5f7fb}*{box-sizing:border-box}body{margin:0}main{max-width:1050px;margin:auto;padding:32px 18px 60px}header,.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 12px 32px rgba(14,31,61,.06)}header{padding:26px}h1{margin:0 0 7px}p{color:#64748b;line-height:1.55}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button,a{min-height:44px;border:0;border-radius:13px;padding:0 15px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:.76rem;text-decoration:none;cursor:pointer}.primary{background:#0E1F3D;color:#fff}.secondary{background:#eef2ff;color:#3730a3}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.card{padding:18px}.result,.check{padding:11px 12px;border-radius:13px;border:1px solid #e2e8f0;background:#f8fafc;margin-top:8px}.result span{display:block;margin-top:4px;color:#64748b}.pass{border-color:#bbf7d0;background:#f0fdf4}.fail{border-color:#fecaca;background:#fef2f2}.check{display:flex;gap:9px}.check input{width:20px;height:20px}@media(max-width:760px){.grid{grid-template-columns:1fr}.toolbar>*{width:100%}}</style></head><body><main><header><h1>NEXLAB v26.9.0 — Estabilização de Projetos</h1><p>Homologação das correções 5 a 8 de 22.</p><div class="toolbar"><button class="primary" id="run">Executar testes técnicos</button><a class="secondary" href="./index.html">Abrir o app</a></div></header><section class="grid"><article class="card"><h2>Testes automáticos</h2><div id="results"></div></article><article class="card"><h2>Checklist funcional</h2><label class="check"><input type="checkbox"><span>Evento ou reunião inexistente não pode ser vinculado ao projeto.</span></label><label class="check"><input type="checkbox"><span>Nome, etapa e prioridade inválidos são rejeitados.</span></label><label class="check"><input type="checkbox"><span>Dois projetos novos na mesma etapa recebem posições diferentes.</span></label><label class="check"><input type="checkbox"><span>Mudança de etapa ocorre somente pelo Kanban ou pela edição segura.</span></label><label class="check"><input type="checkbox"><span>Responsável consegue editar descrição, prazo, prioridade e etapa.</span></label><label class="check"><input type="checkbox"><span>Responsável não autor não consegue transferir responsável ou equipe.</span></label><label class="check"><input type="checkbox"><span>Autor e gestor global conseguem realizar as transferências.</span></label></article></section></main><script>const results=document.querySelector('#results');function add(n,p,d){const e=document.createElement('div');e.className='result '+(p?'pass':'fail');e.innerHTML='<strong>'+(p?'APROVADO — ':'FALHA — ')+n+'</strong><span>'+d+'</span>';results.appendChild(e)}async function text(u){const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw Error(u);return r.text()}async function run(){results.innerHTML='';try{const [release,js,sw,sql]=await Promise.all([fetch('./release.json',{cache:'no-store'}).then(r=>r.json()),text('./assets/index-CKPsxFpP.js'),text('./nexlab-sw.js'),text('./supabase/supabase_v26_9_0_projetos_correcoes_5_a_8.sql')]);add('Escopo',release.scope.includes('correções 5 a 8'),'Release atual identificado.');add('Vínculos íntegros',sql.includes('nexlab_validate_project_link_v2690')&&sql.includes('evento informado não existe'),'Trigger de validação localizado.');add('Estrutura protegida',sql.includes('projects_name_not_blank_check')&&sql.includes('projects_status_check')&&sql.includes('projects_priority_check'),'Restrições localizadas.');add('Kanban concorrente',sql.includes('projects_status_kanban_order_unique')&&sql.includes('pg_advisory_xact_lock'),'Lock e unicidade localizados.');add('Edição segura',js.includes('nexlab_update_project_v2690')&&sql.includes('nexlab_project_update_guard_v2690'),'Frontend e banco alinhados.');add('Transferências',js.includes('canTransferProject')&&js.includes('canChangeProjectTeam'),'Campos granulares identificados.');add('Service Worker',sw.includes('nexlab-v26-9-0-shell-r6'),'Cache r6 identificado.')}catch(e){add('Execução',false,e.message)}}document.querySelector('#run').onclick=run;</script></body></html>
