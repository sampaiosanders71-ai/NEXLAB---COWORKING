<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>NEXLAB v26.9.0 — Homologação Projetos</title><style>:root{font-family:Inter,system-ui,Arial,sans-serif;color:#0E1F3D;background:#f5f7fb}*{box-sizing:border-box}body{margin:0}main{max-width:1050px;margin:auto;padding:32px 18px 60px}header,.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 12px 32px rgba(14,31,61,.06)}header{padding:26px}h1{margin:0 0 7px}p{color:#64748b;line-height:1.55}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button,a{min-height:44px;border:0;border-radius:13px;padding:0 15px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:.76rem;text-decoration:none;cursor:pointer}.primary{background:#0E1F3D;color:#fff}.secondary{background:#eef2ff;color:#3730a3}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.card{padding:18px}.result,.check{padding:11px 12px;border-radius:13px;border:1px solid #e2e8f0;background:#f8fafc;margin-top:8px}.result span{display:block;margin-top:4px;color:#64748b}.pass{border-color:#bbf7d0;background:#f0fdf4}.fail{border-color:#fecaca;background:#fef2f2}.check{display:flex;gap:9px}.check input{width:20px;height:20px}@media(max-width:760px){.grid{grid-template-columns:1fr}.toolbar>*{width:100%}}</style></head><body><main><header><h1>NEXLAB v26.9.0 — Homologação da etapa 4</h1><p>Validação das notificações, vínculos, indicadores e relatórios consolidados.</p><div class="toolbar"><button class="primary" id="run">Executar testes técnicos</button><a class="secondary" href="./index.html">Abrir o app</a></div></header><section class="grid"><article class="card"><h2>Testes automáticos</h2><div id="results"></div></article><article class="card"><h2>Checklist funcional</h2><label class="check"><input type="checkbox"><span>Indicadores aparecem e aplicam os filtros correspondentes.</span></label><label class="check"><input type="checkbox"><span>Equipe pode ser definida e alterada no formulário do projeto.</span></label><label class="check"><input type="checkbox"><span>Evento pode ser vinculado e removido no painel.</span></label><label class="check"><input type="checkbox"><span>Reunião pode ser vinculada e removida no painel.</span></label><label class="check"><input type="checkbox"><span>Registro já vinculado não aparece como disponível em outro projeto.</span></label><label class="check"><input type="checkbox"><span>Histórico registra inclusão e remoção de vínculos.</span></label><label class="check"><input type="checkbox"><span>Responsável recebe notificações de projeto e tarefas.</span></label><label class="check"><input type="checkbox"><span>PDF consolidado de Projetos é gerado.</span></label><label class="check"><input type="checkbox"><span>XLSX consolidado contém Resumo e Projetos.</span></label><label class="check"><input type="checkbox"><span>Exportação aparece no histórico da Central de Relatórios.</span></label></article></section></main><script>const results=document.querySelector('#results');function add(n,p,d){const e=document.createElement('div');e.className='result '+(p?'pass':'fail');e.innerHTML='<strong>'+(p?'APROVADO — ':'FALHA — ')+n+'</strong><span>'+d+'</span>';results.appendChild(e)}async function text(u){const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw Error(u);return r.text()}async function run(){results.innerHTML='';try{const [release,js,css,sw,sql]=await Promise.all([fetch('./release.json',{cache:'no-store'}).then(r=>r.json()),text('./assets/index-CKPsxFpP.js'),text('./assets/nexlab-visual-v26-7.css'),text('./nexlab-sw.js'),text('./supabase/supabase_v26_9_0_projetos_etapa_2_pontos_10_a_12.sql')]);add('Escopo',release.version==='26.9.0'&&release.scope.includes('10, 11 e 12'),'Release e escopo conferidos.');add('Indicadores',js.includes('project-indicators-v2690')&&css.includes('.project-indicators-v2690'),'Indicadores encontrados.');add('Vínculos',js.includes('nexlab_manage_project_link_v2690')&&js.includes('project-links-v2690'),'Gestão de vínculos encontrada.');add('Relatório',js.includes('nexlab_get_projects_report_v2690')&&js.includes('nexlab_projetos_consolidado'),'Relatório consolidado encontrado.');add('Migration',sql.includes('create table if not exists public.project_links')&&sql.includes('nexlab_project_notification_v2690'),'SQL de vínculos e notificações encontrado.');add('Service Worker',sw.includes('nexlab-v26-9-0-shell-r4'),'Cache r4 identificado.')}catch(e){add('Execução',false,e.message)}}document.querySelector('#run').onclick=run;</script></body></html>
