<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0E1F3D">
<title>NEXLAB v26.8.0 — Prontidão final</title>
<style>
:root{font-family:Inter,system-ui,Arial,sans-serif;color:#0E1F3D;background:#f5f7fb}*{box-sizing:border-box}body{margin:0}main{max-width:1080px;margin:auto;padding:32px 18px 60px}header,.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 12px 32px rgba(14,31,61,.06)}header{padding:26px}h1{margin:0 0 7px}header p{color:#64748b}.badge{display:inline-flex;padding:7px 10px;border-radius:999px;background:#ecfdf5;color:#047857;font-size:.7rem;font-weight:900}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button,a.btn{min-height:44px;border:0;border-radius:13px;padding:0 15px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:.76rem;text-decoration:none;cursor:pointer}.primary{background:#0E1F3D;color:#fff}.secondary{background:#eef2ff;color:#3730a3}.danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}.progress{margin-top:18px}.track{height:10px;border-radius:999px;background:#e2e8f0;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#0A6BFF,#7c3aed,#FF8A00);transition:width .2s}.progress p{margin:7px 0 0;color:#64748b;font-size:.72rem;font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}.card{padding:18px}.card h2{margin:0 0 10px;font-size:1rem}.checks{display:grid;gap:8px}.check{display:flex;align-items:flex-start;gap:9px;padding:10px;border:1px solid #e2e8f0;border-radius:12px}.check input{width:20px;height:20px;flex:none}.check span{font-size:.75rem;line-height:1.45}.check small{display:block;margin-top:3px;color:#64748b}.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.meta div{padding:11px;border-radius:13px;background:#f8fafc}.meta span{display:block;color:#64748b;font-size:.62rem;text-transform:uppercase;font-weight:900}.meta strong{display:block;margin-top:4px;font-size:.8rem;overflow-wrap:anywhere}@media(max-width:760px){.grid{grid-template-columns:1fr}.meta{grid-template-columns:1fr}.toolbar>*{width:100%}}
</style>
</head>
<body><main>
<header><h1>NEXLAB v26.8.0 — Prontidão final</h1><p>Checklist definitivo da Gestão de Equipes completa.</p><span class="badge">Pontos 1 a 11 concluídos</span>
<div class="toolbar"><button class="primary" id="run">Verificar pacote</button><button class="secondary" id="export">Exportar checklist</button><button class="danger" id="clear">Limpar marcações</button><a class="btn secondary" href="./homologacao.html">Abrir homologação</a><a class="btn secondary" href="./index.html">Abrir app</a></div>
<div class="progress"><div class="track"><div class="bar" id="bar"></div></div><p id="progress-text">0% concluído</p></div></header>
<section class="grid">
<article class="card"><h2>Versão e pacote</h2><div class="meta" id="meta"></div><div class="checks" data-group="package"></div></article>
<article class="card"><h2>Supabase</h2><div class="checks" data-group="supabase"></div></article>
<article class="card"><h2>Equipes</h2><div class="checks" data-group="teams"></div></article>
<article class="card"><h2>Notificações e Realtime</h2><div class="checks" data-group="notifications"></div></article>
<article class="card"><h2>Publicação</h2><div class="checks" data-group="publish"></div></article>
<article class="card"><h2>Pós-publicação</h2><div class="checks" data-group="monitoring"></div></article>
</section></main>
<script>
const VERSION='26.8.0';const KEY='nexlab:readiness:v26.8.0:equipes-final';
const groups={
package:[['release.json informa v26.8.0 e revisão equipes-final.','Verificação automática disponível.'],['ZIP final foi validado sem arquivos corrompidos.','Conferir antes do upload.'],['JavaScript e Service Worker passaram na verificação de sintaxe.','Executado durante a geração.']],
supabase:[['Migrations da etapa 3 estão aplicadas no projeto atual.','Histórico, notificações e vínculos.'],['Tabelas team_history e team_links existem com RLS.','Leitura limitada pelas permissões da equipe.'],['As duas tabelas estão no Supabase Realtime.','Histórico e vínculos atualizam sem recarregar.'],['As ações team_link_added e team_link_removed são aceitas pela auditoria.','Nenhuma ação inválida encontrada.']],
teams:[['Criar e editar equipe registra histórico.','Validar autor e horário.'],['Adicionar, remover e alterar função registra histórico.','Validar os quatro papéis.'],['Arquivar e restaurar registra motivo e evento.','Equipe arquivada permanece somente leitura.'],['Projetos, eventos e reuniões podem ser vinculados.','Validar também a remoção do vínculo.']],
notifications:[['Inclusão e remoção de integrante geram notificação.','Verificar sino e Central.'],['Mudança de função e transferência de responsabilidade geram aviso.','Testar duas contas.'],['Arquivamento e restauração notificam os integrantes.','Verificar deduplicação.'],['Realtime atualiza histórico e vínculos em duas sessões.','Não deve exigir F5.']],
publish:[['Deployment do GitHub Pages terminou verde.','Não fazer outro commit enquanto estiver ativo.'],['Cache nexlab-v26-8-0-shell-r3 foi publicado.','Fechar e reabrir o PWA.'],['Arquivos mantiveram as pastas assets, brand, icons e supabase.','Não achatar o ZIP.'],['ADM, Coordenador, Bolsista e Júnior foram testados.','Confirmar regras de visibilidade.']],
monitoring:[['Erros do Supabase foram verificados após os testes.','Consultar API, Postgres e Realtime.'],['Notificações foram entregues sem duplicidade.','Validar source_key.'],['Histórico da equipe apresenta os eventos na ordem correta.','Mais recente primeiro.'],['Revisão pós-publicação foi definida para 24–48h.','Registrar qualquer regressão.']]};
function state(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}function save(v){localStorage.setItem(KEY,JSON.stringify(v))}function render(){const current=state();for(const[group,items]of Object.entries(groups)){const host=document.querySelector(`[data-group="${group}"]`);host.replaceChildren();items.forEach(([title,detail],index)=>{const label=document.createElement('label');label.className='check';const input=document.createElement('input');input.type='checkbox';input.checked=Boolean(current[`${group}:${index}`]);input.addEventListener('change',()=>{const next=state();next[`${group}:${index}`]=input.checked;save(next);update()});const span=document.createElement('span');span.textContent=title;const small=document.createElement('small');small.textContent=detail;span.appendChild(small);label.append(input,span);host.appendChild(label)})}update()}function update(){const inputs=[...document.querySelectorAll('.check input')];const done=inputs.filter(i=>i.checked).length;const percent=inputs.length?Math.round(done/inputs.length*100):0;document.getElementById('bar').style.width=`${percent}%`;document.getElementById('progress-text').textContent=`${percent}% concluído — ${done} de ${inputs.length} itens`}
async function verify(){const meta=document.getElementById('meta');const checks=[];async function add(label,path,validate){try{const response=await fetch(path,{cache:'no-store'});if(!response.ok)throw new Error(`HTTP ${response.status}`);const value=await(path.endsWith('.json')?response.json():response.text());if(validate&&!validate(value))throw new Error('Conteúdo inesperado');checks.push([label,'Aprovado'])}catch(error){checks.push([label,`Falhou: ${error.message}`])}}await add('Release','./release.json',v=>v.version==='26.8.0'&&v.revision==='equipes-final');await add('Service Worker','./nexlab-sw.js',v=>v.includes('nexlab-v26-8-0-shell-r3'));await add('Módulo Equipes','./assets/index-CKPsxFpP.js',v=>v.includes('nexlab_get_team_workspace_v2680')&&v.includes('nexlab_manage_team_link_v2680'));await add('SQL etapa 3','./supabase/supabase_v26_8_0_equipes_etapa_3.sql',v=>v.includes('team_history')&&v.includes('team_links'));meta.replaceChildren(...checks.map(([label,value])=>{const div=document.createElement('div');const span=document.createElement('span');span.textContent=label;const strong=document.createElement('strong');strong.textContent=value;div.append(span,strong);return div}))}
function exportData(){const payload={version:VERSION,url:location.href,checklist:state(),capturedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download=`nexlab-prontidao-v26.8.0-${new Date().toISOString().slice(0,10)}.json`;link.click();URL.revokeObjectURL(url)}
document.getElementById('run').addEventListener('click',verify);document.getElementById('export').addEventListener('click',exportData);document.getElementById('clear').addEventListener('click',()=>{localStorage.removeItem(KEY);render()});render();verify();
</script></body></html>
